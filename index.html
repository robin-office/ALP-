<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALP Astrology | Advanced Social Media OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        astro: {
                            bg: '#040b16',
                            surface: '#0a1428',
                            card: '#111d36',
                            cardHover: '#182747',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #040b16;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        .scale-in { animation: scaleIn 0.2s cubic-bezier(0.16,1,0.3,1) forwards; transform-origin: center; }
        .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(10px); }
        
        @keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        @keyframes fadeInUp { to { opacity:1; transform:translateY(0); } }

        .glass-card {
            background: rgba(10,20,40,0.8);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .glass-input {
            background: rgba(17,29,54,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
        }
        .glass-input:focus { border-color: rgba(37,99,235,0.5); outline:none; box-shadow: 0 0 0 1px rgba(37,99,235,0.5); }

        /* Sync indicator pulse */
        @keyframes pulse-green { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .sync-pulse { animation: pulse-green 1.5s ease-in-out infinite; }
        
        /* Toast notification */
        .toast { 
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            padding: 12px 20px; border-radius: 14px; font-size: 13px; font-weight: 500;
            backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease forwards;
            max-width: 320px;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .toast-success { background: rgba(16,185,129,0.15); color: #6ee7b7; border-color: rgba(16,185,129,0.2); }
        .toast-error   { background: rgba(239,68,68,0.15);  color: #fca5a5; border-color: rgba(239,68,68,0.2); }
        .toast-info    { background: rgba(59,130,246,0.15); color: #93c5fd; border-color: rgba(59,130,246,0.2); }
        .toast-warning { background: rgba(245,158,11,0.15); color: #fcd34d; border-color: rgba(245,158,11,0.2); }
    </style>
</head>
<body class="antialiased">

    <!-- Background Effects -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] md:w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[100px] mix-blend-screen"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[70%] md:w-[50%] h-[50%] bg-amber-500/5 rounded-full blur-[120px] mix-blend-screen"></div>
    </div>

    <div id="app-root" class="relative z-10 w-full h-screen"></div>
    <div id="modals-container"></div>
    <div id="toast-container"></div>

    <script>
    // ══════════════════════════════════════════════════════════
    //  🔑  CONFIGURATION  —  paste your Apps Script URL below
    // ══════════════════════════════════════════════════════════
    const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';
    //  ↑ Replace with your deployed Web App URL
    //  Get it from: Apps Script → Deploy → Manage Deployments → Copy URL
    // ══════════════════════════════════════════════════════════

    // ── Data Models ──────────────────────────────────────────
    const USERS = [
        { id: 'admin_1', name: 'Master Admin',     role: 'admin', avatar: 'https://i.pravatar.cc/150?u=admin' },
        { id: 'user_1',  name: 'Employee Santhosh', role: 'user',  avatar: 'https://i.pravatar.cc/150?u=santhosh' },
        { id: 'user_2',  name: 'Employee Pavithra', role: 'user',  avatar: 'https://i.pravatar.cc/150?u=pavithra' }
    ];

    const COLUMNS = ['Idea','Script','Recording','Editing','Review','Ready','Scheduled','Posted'];

    const INITIAL_ACCOUNTS = {
        'user_1': [
            { id:'ig_sasti',  platform:'Instagram', name:'ALP Sasti TV Official',     url:'https://www.instagram.com/alp_sasti_tv_official/' },
            { id:'ig_pothu',  platform:'Instagram', name:'Pothuvudaimoorthy ALP',     url:'https://www.instagram.com/pothuvudaimoorthy_alp/' },
            { id:'fb_moorthy',platform:'Facebook',  name:'AlpAstrologymoorthy',        url:'https://www.facebook.com/AlpAstrologymoorthy/' },
            { id:'fb_sasti',  platform:'Facebook',  name:'ALP Sasti',                  url:'https://www.facebook.com/alp.sasti' },
            { id:'tg_astro',  platform:'Telegram',  name:'ALP Astrology TV',           url:'https://t.me/ALPASTROLOGYtv' },
            { id:'bl_astro',  platform:'Blogger',   name:'ALP Astrology Blog',         url:'https://alpastrology.blogspot.com/' }
        ],
        'user_2': [
            { id:'fb_nam',     platform:'Facebook', name:'NAM JOTHIDAM',               url:'https://www.facebook.com/NAM.JOTHIDAM/' },
            { id:'fb_inventor',platform:'Facebook', name:'ALP Astrologer Inventor',    url:'https://www.facebook.com/alpAstrologerinventor/' },
            { id:'fb_prof1',   platform:'Facebook', name:'FB Profile 1',               url:'https://www.facebook.com/profile.php?id=61556421629840' },
            { id:'fb_prof2',   platform:'Facebook', name:'FB Profile 2',               url:'https://www.facebook.com/profile.php?id=100064983311770' }
        ]
    };

    // ── Global State ─────────────────────────────────────────
    const state = {
        currentUser: null,
        activeTab: 'dashboard',
        selectedDate: new Date().toISOString().split('T')[0],
        searchTerm: '',
        isMobileMenuOpen: false,
        exportDropdownOpen: false,
        // Data
        videos: [],
        userAccounts: JSON.parse(JSON.stringify(INITIAL_ACCOUNTS)),
        dailyTasks: [],
        // Sync status
        syncStatus: 'idle',    // idle | syncing | success | error | offline
        lastSynced: null,
        isScriptConfigured: false,
        pendingChanges: [],    // queue of actions to push
    };

    // ── Google Sheets Sync Layer ──────────────────────────────
    function isConfigured() {
        return SCRIPT_URL && SCRIPT_URL !== 'https://script.google.com/macros/s/AKfycbzD1fFUduJ9WWv6YmpMSbNsoxW2OcPKDr-USRhjJ4ll1kh9dpro4p2K5KEEFZjqVZ5d/exec';
    }

    async function gsRequest(action, payload = {}) {
        if (!isConfigured()) throw new Error('Script URL not configured');
        const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action, payload })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Unknown error');
        return json.data;
    }

    function setSyncStatus(status) {
        state.syncStatus = status;
        if (status === 'success') state.lastSynced = new Date();
        updateSyncIndicator();
    }

    function updateSyncIndicator() {
        const el = document.getElementById('sync-indicator');
        if (!el) return;
        if (!isConfigured()) {
            el.innerHTML = `<span class="flex items-center gap-1.5 text-amber-400 text-[10px] font-semibold cursor-pointer hover:text-amber-300" onclick="openSetupModal()">
                <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> Setup Required
            </span>`;
            lucide.createIcons({ nodes: [el] });
            return;
        }
        const configs = {
            idle:    { color:'text-slate-500', dot:'bg-slate-600',    label:'Connected' },
            syncing: { color:'text-blue-400',  dot:'bg-blue-400 sync-pulse', label:'Syncing...' },
            success: { color:'text-teal-400',  dot:'bg-teal-400',     label: state.lastSynced ? `Saved ${state.lastSynced.toLocaleTimeString()}` : 'Saved' },
            error:   { color:'text-rose-400',  dot:'bg-rose-400',     label:'Sync Error' },
            offline: { color:'text-amber-400', dot:'bg-amber-400',    label:'Local Mode' },
        };
        const c = configs[state.syncStatus] || configs.idle;
        el.innerHTML = `<span class="flex items-center gap-1.5 ${c.color} text-[10px] font-semibold">
            <span class="w-1.5 h-1.5 rounded-full ${c.dot} inline-block"></span>${c.label}
        </span>`;
        lucide.createIcons({ nodes: [el] });
    }

    // Load full state from Google Sheets on startup
    async function loadFromSheets() {
        if (!isConfigured()) {
            state.syncStatus = 'offline';
            // Load initial demo data
            state.videos = [
                { id:'v1', title:'Jupiter Transit Effects', topic:'Astrology', about:'Detailed analysis', speaker:'Moorthy', speakerPriority:'High', priority:'High', status:'Editing', assignee:'user_1', postDate:'', postTime:'', captionReady:true, hashtagsReady:false, thumbnailReady:true, ctaAdded:false, speakerTag:false, notes:'', ig_acc:'@alp_sasti_tv_official', fb_acc:'@AlpAstrologymoorthy', yt_shorts:'@alpsasti', x_acc:'', threads_acc:'', links:{} },
                { id:'v2', title:'Daily Horoscope Highlights', topic:'Daily', about:'Quick snapshot for all zodiac signs', speaker:'Pavithra', speakerPriority:'Medium', priority:'Low', status:'Posted', assignee:'user_2', postDate:new Date().toISOString().split('T')[0], postTime:'09:00', captionReady:true, hashtagsReady:true, thumbnailReady:true, ctaAdded:true, speakerTag:true, notes:'Good early engagement', ig_acc:'', fb_acc:'@NAM.JOTHIDAM', yt_shorts:'', x_acc:'', threads_acc:'', links:{ instagram:'https://instagram.com/p/12345' } }
            ];
            updateSyncIndicator();
            return;
        }
        setSyncStatus('syncing');
        try {
            const data = await gsRequest('getFullState');
            if (data.videos      && data.videos.length)       state.videos      = data.videos;
            if (data.dailyTasks  && data.dailyTasks.length)   state.dailyTasks  = data.dailyTasks;
            if (data.userAccounts && Object.keys(data.userAccounts).length) {
                // Merge: sheet accounts override defaults but preserve defaults for users with no sheet data
                Object.entries(data.userAccounts).forEach(([uid, accs]) => {
                    state.userAccounts[uid] = accs;
                });
            }
            setSyncStatus('success');
            showToast('✓ Data loaded from Google Sheets', 'success');
            renderApp();
        } catch (err) {
            console.error('Load error:', err);
            setSyncStatus('error');
            showToast('Could not load from Sheets — using local data', 'warning');
        }
    }

    // Save a single video
    async function syncVideo(video) {
        if (!isConfigured()) return;
        setSyncStatus('syncing');
        try {
            await gsRequest('saveVideo', video);
            setSyncStatus('success');
        } catch(e) {
            setSyncStatus('error');
            showToast('Sync failed: ' + e.message, 'error');
        }
    }

    // Save daily task
    async function syncDailyTask(task) {
        if (!isConfigured()) return;
        setSyncStatus('syncing');
        try {
            await gsRequest('saveDailyTask', task);
            setSyncStatus('success');
        } catch(e) {
            setSyncStatus('error');
            showToast('Sync failed: ' + e.message, 'error');
        }
    }

    // Save account
    async function syncAccount(acc, userId) {
        if (!isConfigured()) return;
        setSyncStatus('syncing');
        try {
            await gsRequest('saveAccount', { ...acc, userId });
            setSyncStatus('success');
        } catch(e) {
            setSyncStatus('error');
        }
    }

    // Delete account from sheet
    async function syncDeleteAccount(id, userId) {
        if (!isConfigured()) return;
        try { await gsRequest('deleteAccount', { id, userId }); } catch(e) {}
    }

    // Manual full sync button
    async function forceSyncAll() {
        if (!isConfigured()) { openSetupModal(); return; }
        setSyncStatus('syncing');
        showToast('Syncing all data...', 'info');
        try {
            await gsRequest('saveFullState', {
                videos:       state.videos,
                dailyTasks:   state.dailyTasks,
                userAccounts: state.userAccounts
            });
            setSyncStatus('success');
            showToast('✓ All data synced to Google Sheets!', 'success');
        } catch(e) {
            setSyncStatus('error');
            showToast('Full sync failed: ' + e.message, 'error');
        }
    }

    // ── Toast Notifications ───────────────────────────────────
    function showToast(msg, type = 'info') {
        const id = 'toast_' + Date.now();
        const icons = { success:'check-circle', error:'x-circle', warning:'alert-triangle', info:'info' };
        const el = document.createElement('div');
        el.id = id;
        el.className = `toast toast-${type}`;
        el.innerHTML = `<div class="flex items-center gap-2"><i data-lucide="${icons[type]||'info'}" class="w-4 h-4 shrink-0"></i><span>${msg}</span></div>`;
        document.getElementById('toast-container').appendChild(el);
        lucide.createIcons({ nodes: [el] });
        setTimeout(() => { el.style.opacity='0'; el.style.transform='translateY(10px)'; el.style.transition='0.3s'; setTimeout(()=>el.remove(), 300); }, 3000);
    }

    // ── Setup Modal ───────────────────────────────────────────
    function openSetupModal() {
        const modalHtml = `
        <div id="setup-modal" class="fixed inset-0 z-[200] flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal('setup-modal')"></div>
            <div class="glass-card p-6 w-full max-w-2xl relative z-10 scale-in max-h-[90vh] overflow-y-auto custom-scrollbar">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-xl font-bold text-white flex items-center gap-2">
                            <i data-lucide="sheet" class="text-teal-400 w-5 h-5"></i> Google Sheets Setup
                        </h2>
                        <p class="text-slate-400 text-xs mt-1">Connect your app to Google Sheets in 5 minutes</p>
                    </div>
                    <button onclick="closeModal('setup-modal')" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>

                <div class="space-y-4">
                    <!-- Step 1 -->
                    <div class="bg-astro-card border border-white/[0.05] rounded-2xl p-4">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="w-7 h-7 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center text-xs font-bold border border-blue-500/30 shrink-0">1</span>
                            <h3 class="font-semibold text-slate-200 text-sm">Open Google Apps Script</h3>
                        </div>
                        <p class="text-xs text-slate-400 pl-10">Go to <a href="https://script.google.com" target="_blank" class="text-blue-400 hover:underline font-medium">script.google.com</a> and create a <strong class="text-slate-300">New Project</strong>.</p>
                    </div>

                    <!-- Step 2 -->
                    <div class="bg-astro-card border border-white/[0.05] rounded-2xl p-4">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="w-7 h-7 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center text-xs font-bold border border-blue-500/30 shrink-0">2</span>
                            <h3 class="font-semibold text-slate-200 text-sm">Paste the Backend Code</h3>
                        </div>
                        <p class="text-xs text-slate-400 pl-10">Replace everything in <code class="bg-astro-surface px-1.5 py-0.5 rounded text-amber-400">Code.gs</code> with the content from <strong class="text-slate-300">GoogleAppsScript_Backend.gs</strong> file provided alongside this HTML.</p>
                    </div>

                    <!-- Step 3 -->
                    <div class="bg-astro-card border border-white/[0.05] rounded-2xl p-4">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="w-7 h-7 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center text-xs font-bold border border-blue-500/30 shrink-0">3</span>
                            <h3 class="font-semibold text-slate-200 text-sm">Deploy as Web App</h3>
                        </div>
                        <div class="pl-10 text-xs text-slate-400 space-y-1.5">
                            <p>Click <strong class="text-slate-300">Deploy → New Deployment</strong></p>
                            <p>Type: <span class="text-teal-400 font-medium">Web App</span></p>
                            <p>Execute as: <span class="text-teal-400 font-medium">Me</span></p>
                            <p>Who has access: <span class="text-teal-400 font-medium">Anyone</span></p>
                            <p>Click <strong class="text-slate-300">Deploy</strong> → Authorize → Copy the URL</p>
                        </div>
                    </div>

                    <!-- Step 4 -->
                    <div class="bg-astro-card border border-white/[0.05] rounded-2xl p-4">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="w-7 h-7 rounded-full bg-teal-500/20 text-teal-400 flex items-center justify-center text-xs font-bold border border-teal-500/30 shrink-0">4</span>
                            <h3 class="font-semibold text-slate-200 text-sm">Paste URL & Save</h3>
                        </div>
                        <p class="text-xs text-slate-400 pl-10 mb-3">Open this HTML file in a text editor, find <code class="bg-astro-surface px-1.5 py-0.5 rounded text-amber-400">SCRIPT_URL</code> at the top of the script, and replace the placeholder with your Web App URL.</p>
                        <div class="pl-10">
                            <div class="bg-astro-surface border border-white/[0.05] rounded-xl p-3 font-mono text-xs text-slate-400 overflow-x-auto">
                                <span class="text-slate-500">const</span> <span class="text-blue-300">SCRIPT_URL</span> = <span class="text-teal-300">'https://script.google.com/macros/s/YOUR_ID/exec'</span>;
                            </div>
                        </div>
                    </div>

                    <div class="bg-amber-500/10 border border-amber-500/20 rounded-2xl p-4 text-xs text-amber-300 flex gap-3">
                        <i data-lucide="shield-check" class="w-4 h-4 shrink-0 mt-0.5"></i>
                        <p>The Google Sheet will be auto-created in your Google Drive as <strong>"ALP Astrology Database"</strong> on the first data save. All data is stored in your own Google account — Anthropic never sees it.</p>
                    </div>
                </div>
            </div>
        </div>`;
        document.getElementById('modals-container').insertAdjacentHTML('beforeend', modalHtml);
        lucide.createIcons();
    }

    // ── Helper Functions ──────────────────────────────────────
    function getPlatformIconHTML(platform, size=20) {
        const p = platform.toLowerCase();
        if (p==='instagram') return `<i data-lucide="instagram" class="text-pink-500" style="width:${size}px;height:${size}px"></i>`;
        if (p==='facebook')  return `<i data-lucide="facebook"  class="text-blue-500" style="width:${size}px;height:${size}px"></i>`;
        if (p==='youtube')   return `<i data-lucide="youtube"   class="text-red-500"  style="width:${size}px;height:${size}px"></i>`;
        if (p==='telegram')  return `<i data-lucide="send"      class="text-sky-500"  style="width:${size}px;height:${size}px"></i>`;
        if (p==='x'||p==='twitter') return `<i data-lucide="twitter" class="text-slate-300" style="width:${size}px;height:${size}px"></i>`;
        if (p==='blogger')   return `<i data-lucide="file-text" class="text-orange-500" style="width:${size}px;height:${size}px"></i>`;
        return `<i data-lucide="globe" class="text-blue-400" style="width:${size}px;height:${size}px"></i>`;
    }

    function showCustomAlert(title, message) {
        const modalHtml = `
            <div id="alert-modal" class="fixed inset-0 z-[200] flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal('alert-modal')"></div>
                <div class="glass-card p-6 w-full max-w-sm relative z-10 scale-in text-center">
                    <div class="mx-auto w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center mb-4 text-blue-400"><i data-lucide="info"></i></div>
                    <h3 class="text-lg font-bold text-white mb-2">${title}</h3>
                    <p class="text-sm text-slate-400 mb-6">${message}</p>
                    <button onclick="closeModal('alert-modal')" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white font-medium py-2.5 rounded-xl">Got it</button>
                </div>
            </div>`;
        document.getElementById('modals-container').insertAdjacentHTML('beforeend', modalHtml);
        lucide.createIcons();
    }

    function exportToCSV(data, filename) {
        if (!data || !data.length) { showCustomAlert('Export Failed','No data available.'); return; }
        const headers = Object.keys(data[0]).join(',');
        const rows = data.map(row => Object.values(row).map(val=>`"${String(val).replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob = new Blob([`${headers}\n${rows}`], { type:'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', filename);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    // ── State Mutations ───────────────────────────────────────
    function toggleMobileMenu(forceClose=false) { state.isMobileMenuOpen = forceClose ? false : !state.isMobileMenuOpen; renderApp(); }
    function toggleExportDropdown() { state.exportDropdownOpen = !state.exportDropdownOpen; renderApp(); }

    function loginUser(userId) {
        state.currentUser = USERS.find(u => u.id === userId);
        state.activeTab = 'dashboard';
        state.isMobileMenuOpen = false;
        renderApp();
        // Load data after login
        loadFromSheets();
    }

    function logoutUser() { state.currentUser = null; state.isMobileMenuOpen = false; renderApp(); }

    function setTab(tabId) { state.activeTab = tabId; state.isMobileMenuOpen = false; renderApp(); }

    function changeDate(days) {
        const d = new Date(state.selectedDate); d.setDate(d.getDate() + days);
        state.selectedDate = d.toISOString().split('T')[0]; renderApp();
    }

    function updateTaskCount(accountId, change) {
        let task = state.dailyTasks.find(t => t.date===state.selectedDate && t.userId===state.currentUser.id);
        if (!task) {
            task = { id:`dt_${Date.now()}`, date:state.selectedDate, userId:state.currentUser.id, accounts:{} };
            state.dailyTasks.push(task);
        }
        if (typeof task.accounts[accountId]==='number') task.accounts[accountId] = { count:task.accounts[accountId], links:[] };
        if (!task.accounts[accountId]) task.accounts[accountId] = { count:0, links:[] };
        const newVal = Math.max(0, task.accounts[accountId].count + change);
        task.accounts[accountId].count = newVal;
        if (task.accounts[accountId].links.length > newVal) task.accounts[accountId].links = task.accounts[accountId].links.slice(0, newVal);
        renderApp();
        // Auto-sync after a short delay (debounced)
        clearTimeout(state._taskSyncTimer);
        state._taskSyncTimer = setTimeout(() => syncDailyTask(task), 1000);
    }

    // ── Export Functions ──────────────────────────────────────
    function handleExportVideos(range) {
        let targetVideos = state.videos;
        if (range==='day') targetVideos = targetVideos.filter(v=>v.postDate===new Date().toISOString().split('T')[0]);
        else if (range==='month') { const m=new Date().toISOString().substring(0,7); targetVideos=targetVideos.filter(v=>v.postDate.startsWith(m)); }
        const dataToExport = targetVideos.map(v => ({
            'ID':v.id,'Title':v.title,'Topic':v.topic||'','Speaker':v.speaker||'','Priority':v.priority||'','Status':v.status,
            'Post Date':v.postDate||'','Post Time':v.postTime||'','Caption':v.captionReady?'Yes':'No','Hashtags':v.hashtagsReady?'Yes':'No',
            'Thumbnail':v.thumbnailReady?'Yes':'No','CTA':v.ctaAdded?'Yes':'No','Tag':v.speakerTag?'Yes':'No',
            'Instagram':v.ig_acc||'','Facebook':v.fb_acc||'','YT Shorts':v.yt_shorts||'','Notes':v.notes||'',
            'Links': v.links ? Object.values(v.links).filter(Boolean).join(' | ') : '',
            'Assignee': USERS.find(u=>u.id===v.assignee)?.name||'Unassigned'
        }));
        exportToCSV(dataToExport, `Videos_${range}_${new Date().toISOString().split('T')[0]}.csv`);
        state.exportDropdownOpen=false; renderApp();
    }

    function handleExportTasks(range) {
        let targets = state.dailyTasks;
        if (range==='day') targets=targets.filter(t=>t.date===state.selectedDate);
        else if (range==='month') { const m=state.selectedDate.substring(0,7); targets=targets.filter(t=>t.date.startsWith(m)); }
        const dataToExport=[];
        targets.forEach(t => {
            const user=USERS.find(u=>u.id===t.userId);
            const accs=state.userAccounts[t.userId]||[];
            accs.forEach(a => {
                const accData=t.accounts[a.id];
                const c=accData?(typeof accData==='number'?accData:accData.count):0;
                if(c>0) dataToExport.push({
                    'Date':t.date,'Employee':user?.name||t.userId,'Platform':a.platform,'Account':a.name,'Posts':c,
                    'Links':(accData.links||[]).filter(l=>l).join(' | ')
                });
            });
        });
        exportToCSV(dataToExport, `Tasks_${range}_${new Date().toISOString().split('T')[0]}.csv`);
        state.exportDropdownOpen=false; renderApp();
    }

    function savePostLinks(e, accountId) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const task = state.dailyTasks.find(t=>t.date===state.selectedDate && t.userId===state.currentUser.id);
        if(task && task.accounts[accountId]) {
            const count = task.accounts[accountId].count;
            task.accounts[accountId].links = [];
            for(let i=0;i<count;i++) task.accounts[accountId].links.push(fd.get(`link_${i}`)||'');
            syncDailyTask(task);
        }
        closeModal('links-modal'); renderApp();
        showToast('Links saved to Google Sheets', 'success');
    }

                            <h3 class="text-sm font-semibold text-blue-400 uppercase tracking-wider flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i> Core Info</h3>
                            <div><label class="block text-xs font-medium text-slate-400 mb-1">Title</label><input name="title" value="${v.title||''}" required class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                            <div><label class="block text-xs font-medium text-slate-400 mb-1">Hook Line</label><input name="hookLine" value="${v.hookLine||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Topic</label><input name="topic" value="${v.topic||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Speaker</label><input name="speaker" value="${v.speaker||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                            </div>
                            <div><label class="block text-xs font-medium text-slate-400 mb-1">About</label><textarea name="about" rows="2" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200 custom-scrollbar">${v.about||''}</textarea></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Speaker Priority</label><select name="speakerPriority" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"><option ${v.speakerPriority==='High'?'selected':''}>High</option><option ${v.speakerPriority==='Medium'?'selected':''}>Medium</option><option ${v.speakerPriority==='Low'?'selected':''}>Low</option></select></div>
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Video Priority</label><select name="priority" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"><option ${v.priority==='High'?'selected':''}>High</option><option ${v.priority==='Medium'?'selected':''}>Medium</option><option ${v.priority==='Low'?'selected':''}>Low</option></select></div>
                            </div>
                            ${state.currentUser.role==='admin' ? `<div><label class="block text-xs font-medium text-slate-400 mb-1">Assignee</label><select name="assignee" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200">${USERS.filter(u=>u.role!=='admin').map(u=>`<option value="${u.id}" ${v.assignee===u.id?'selected':''}>${u.name}</option>`).join('')}</select></div>` : `<input type="hidden" name="assignee" value="${v.assignee}">`}
                        </div>
                        <div class="space-y-3 sm:space-y-4">
                            <h3 class="text-sm font-semibold text-amber-400 uppercase tracking-wider flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Target Accounts</h3>
                            ${['ig_acc:Instagram','fb_acc:Facebook','yt_shorts:YouTube Shorts'].map(s=>{const[n,l]=s.split(':');return `<div><label class="block text-xs font-medium text-slate-400 mb-1">${l}</label><input name="${n}" value="${v[n]||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>`;}).join('')}
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">X</label><input name="x_acc" value="${v.x_acc||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Threads</label><input name="threads_acc" value="${v.threads_acc||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 pt-6 border-t border-white/[0.05]">
                        <div class="space-y-3 sm:space-y-4">
                            <h3 class="text-sm font-semibold text-teal-400 uppercase tracking-wider flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> Schedule</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Date</label><input type="date" name="postDate" value="${v.postDate||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200 [color-scheme:dark]"></div>
                                <div><label class="block text-xs font-medium text-slate-400 mb-1">Time</label><input type="time" name="postTime" value="${v.postTime||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200 [color-scheme:dark]"></div>
                            </div>
                            <div><label class="block text-xs font-medium text-slate-400 mb-1">Status</label><select name="status" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200">${COLUMNS.map(c=>`<option value="${c}" ${v.status===c?'selected':''}>${c}</option>`).join('')}</select></div>
                            <div><label class="block text-xs font-medium text-slate-400 mb-1">Notes</label><textarea name="notes" rows="2" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200 custom-scrollbar">${v.notes||''}</textarea></div>
                            <div>
                                <h4 class="text-xs font-semibold text-slate-300 uppercase tracking-wider mb-3">Checklist</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${[['captionReady','Caption'],['hashtagsReady','Hashtags'],['thumbnailReady','Thumbnail'],['ctaAdded','CTA'],['speakerTag','Tag']].map(([k,l])=>`
                                    <label class="flex items-center gap-2 cursor-pointer bg-astro-surface px-3 py-2 rounded-xl border border-white/[0.05] hover:bg-white/5">
                                        <input type="checkbox" name="${k}" ${v[k]?'checked':''} class="w-4 h-4 rounded text-blue-500"> <span class="text-xs text-slate-300">${l}</span>
                                    </label>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <h3 class="text-sm font-semibold text-rose-400 uppercase tracking-wider flex items-center gap-2"><i data-lucide="link" class="w-4 h-4"></i> Video Links</h3>
                            ${[['link_instagram','Instagram URL','instagram'],['link_facebook','Facebook URL','facebook'],['link_youtube','YouTube URL','youtube'],['link_x','X URL','x'],['link_threads','Threads URL','threads']].map(([n,p,k])=>`<input type="url" name="${n}" placeholder="${p}..." value="${v.links?.[k]||''}" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200 mb-2">`).join('')}
                        </div>
                    </div>
                    <div class="pt-4 sticky bottom-0 bg-[#111d36] pb-2 border-t border-white/[0.05] z-20">
                        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-medium py-3.5 rounded-2xl shadow-[0_0_20px_rgba(37,99,235,0.3)]">
                            ${videoId ? 'Save Changes' : 'Create Entry'}
                        </button>
                    </div>
                </form>
            </div>
        </div>`;
        document.getElementById('modals-container').innerHTML = modalHtml;
        lucide.createIcons();
    }

    function saveVideo(e, id) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const index = state.videos.findIndex(v=>v.id===id);
        const updated = {
            title:fd.get('title'), hookLine:fd.get('hookLine'), topic:fd.get('topic'), speaker:fd.get('speaker'), about:fd.get('about'),
            speakerPriority:fd.get('speakerPriority'), priority:fd.get('priority'),
            ig_acc:fd.get('ig_acc'), fb_acc:fd.get('fb_acc'), yt_shorts:fd.get('yt_shorts'), x_acc:fd.get('x_acc'), threads_acc:fd.get('threads_acc'),
            status:fd.get('status'), postDate:fd.get('postDate'), postTime:fd.get('postTime'), notes:fd.get('notes'),
            captionReady:fd.get('captionReady')==='on', hashtagsReady:fd.get('hashtagsReady')==='on',
            thumbnailReady:fd.get('thumbnailReady')==='on', ctaAdded:fd.get('ctaAdded')==='on', speakerTag:fd.get('speakerTag')==='on',
            links:{ instagram:fd.get('link_instagram'), facebook:fd.get('link_facebook'), youtube:fd.get('link_youtube'), x:fd.get('link_x'), threads:fd.get('link_threads') }
        };
        if(fd.has('assignee')) updated.assignee = fd.get('assignee');

        let finalVideo;
        if(index>=0) { state.videos[index]={...state.videos[index],...updated}; finalVideo=state.videos[index]; }
        else { finalVideo={id,...updated}; state.videos.unshift(finalVideo); }

        closeModal('video-modal'); renderApp();
        showToast('Saving to Google Sheets...', 'info');
        syncVideo(finalVideo).then(()=>showToast('✓ Video saved to Google Sheets', 'success'));
    }

    function openAddAccountModal() {
        const modalHtml = `
        <div id="acc-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal('acc-modal')"></div>
            <div class="glass-card p-5 sm:p-6 w-full max-w-sm relative z-10 scale-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-white">Add Account</h2>
                    <button onclick="closeModal('acc-modal')" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <form onsubmit="saveAccount(event)" class="space-y-4">
                    <div><label class="block text-xs font-medium text-slate-400 mb-1">Platform</label>
                    <select name="platform" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200">
                        <option class="bg-astro-card">Instagram</option><option class="bg-astro-card">Facebook</option>
                        <option class="bg-astro-card">YouTube</option><option class="bg-astro-card">Telegram</option>
                        <option class="bg-astro-card">X</option><option class="bg-astro-card">Blogger</option>
                    </select></div>
                    <div><label class="block text-xs font-medium text-slate-400 mb-1">Account Name</label><input name="name" required class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                    <div><label class="block text-xs font-medium text-slate-400 mb-1">URL (Optional)</label><input name="url" type="url" class="w-full glass-input rounded-xl px-4 py-2.5 text-sm text-slate-200"></div>
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white font-medium py-3 rounded-xl">Add Account</button>
                </form>
            </div>
        </div>`;
        document.getElementById('modals-container').innerHTML = modalHtml;
        lucide.createIcons();
    }

    function saveAccount(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const newAcc = { id:`acc_${Date.now()}`, platform:fd.get('platform'), name:fd.get('name'), url:fd.get('url') };
        if(!state.userAccounts[state.currentUser.id]) state.userAccounts[state.currentUser.id]=[];
        state.userAccounts[state.currentUser.id].push(newAcc);
        closeModal('acc-modal'); renderApp();
        syncAccount(newAcc, state.currentUser.id);
        showToast('Account saved to Google Sheets', 'success');
    }

    function closeModal(id) { const el=document.getElementById(id); if(el) el.remove(); }

    // ── Main Render ───────────────────────────────────────────
    function renderApp() {
        const root = document.getElementById('app-root');
        if (!state.currentUser) { root.innerHTML = getLoginHTML(); }
        else {
            root.innerHTML = getMainLayoutHTML();
            const container = document.getElementById('content-container');
            switch(state.activeTab) {
                case 'dashboard': container.innerHTML = getDashboardHTML(); break;
                case 'videos':    container.innerHTML = getVideoManagerHTML(); break;
                case 'kanban':    container.innerHTML = getKanbanHTML(); break;
                case 'tracker':   container.innerHTML = getDailyTrackerHTML(); break;
                default: container.innerHTML = `<div class="p-8 text-slate-400 text-center glass-card">Module in development.</div>`;
            }
            updateSyncIndicator();
        }
        lucide.createIcons();
    }

    window.onload = () => renderApp();
    </script>
</body>
</html>
